name: pages

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pages:
    # A reusable workflow runs with the CALLER's token permissions, so these
    # must be granted here — the callee cannot add them.
    permissions:
      contents: read
      pages: write
      pull-requests: write
      id-token: write
    uses: kuboon/workflows/.github/workflows/github-page-with-preview.yaml@main
    with:
      # `mise run build` (the default) installs Deno and runs `deno task build`
      # in pages/ (see mise.toml), with BASE_URL set by the workflow.
      dist-dir: pages/dist
